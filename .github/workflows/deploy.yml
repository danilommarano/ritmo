name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: sa-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.sa-east-1.amazonaws.com
  BACKEND_IMAGE: ritmo-backend
  FRONTEND_IMAGE: ritmo-frontend

jobs:
  # ─────────────────────────────────────────────
  # Run CI first
  # ─────────────────────────────────────────────
  ci:
    name: CI Pipeline
    uses: ./.github/workflows/ci.yml

  # ─────────────────────────────────────────────
  # Build & push Docker images to ECR
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

    outputs:
      backend_image: ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
      frontend_image: ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  # ─────────────────────────────────────────────
  # Deploy to EC2 via SSH + docker compose
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: production
      url: ${{ secrets.APP_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd /opt/ritmo

            # Pull latest compose files
            git pull origin main

            # Login to ECR
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
              docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

            # Set image tags
            export BACKEND_IMAGE=${{ needs.build-and-push.outputs.backend_image }}
            export FRONTEND_IMAGE=${{ needs.build-and-push.outputs.frontend_image }}

            # Pull new images
            docker compose -f docker-compose.prod.yml pull

            # Run migrations
            docker compose -f docker-compose.prod.yml run --rm backend \
              python manage.py migrate --noinput

            # Collect static files
            docker compose -f docker-compose.prod.yml run --rm backend \
              python manage.py collectstatic --noinput

            # Restart services (zero-downtime via --no-deps)
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Wait for health check
            sleep 10
            curl -sf http://localhost/health || echo "Health check warning"

            # Cleanup old images
            docker image prune -af --filter "until=168h"

            echo "Deploy complete: ${{ github.sha }}"

      - name: Notify deploy success
        if: success()
        run: echo "::notice::Deployed ${{ github.sha }} to production"

      - name: Notify deploy failure
        if: failure()
        run: echo "::error::Deploy failed for ${{ github.sha }}"
