# ============================================================================
# Ritmo — Docker Compose DESENVOLVIMENTO
# ============================================================================
# Uso: docker compose up --build
#      docker compose down
#
# Frontend: http://localhost:5173   (Vite dev server, hot-reload)
# Backend:  http://localhost:8000   (Django runserver)
# Admin:    http://localhost:8000/admin
# ============================================================================

services:
  # ── Banco de dados ────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: ritmo_postgres
    environment:
      POSTGRES_DB: ritmo_db
      POSTGRES_USER: ritmo_user
      POSTGRES_PASSWORD: ritmo_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ritmo_user -d ritmo_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (broker Celery + cache) ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ritmo_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend Django ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ritmo_backend
    command: bash -c "python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - media_files:/app/media
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - DB_NAME=ritmo_db
      - DB_USER=ritmo_user
      - DB_PASSWORD=ritmo_password
      - DB_HOST=postgres
      - DB_PORT=5432
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend
      - SECRET_KEY=dev-insecure-key-change-in-production
      # Celery / Redis
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - USE_ASYNC_EXPORT=${USE_ASYNC_EXPORT:-false}
      # Email (console em dev)
      - EMAIL_BACKEND=django.core.mail.backends.console.EmailBackend
      # OAuth (configure no .env se necessario)
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - FACEBOOK_APP_ID=${FACEBOOK_APP_ID:-}
      - FACEBOOK_APP_SECRET=${FACEBOOK_APP_SECRET:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - APPLE_CLIENT_ID=${APPLE_CLIENT_ID:-}
      - APPLE_CLIENT_SECRET=${APPLE_CLIENT_SECRET:-}
      - APPLE_KEY_ID=${APPLE_KEY_ID:-}
      - APPLE_PRIVATE_KEY=${APPLE_PRIVATE_KEY:-}
      # Stripe
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    stdin_open: true
    tty: true

  # ── Celery worker (filas de export) ───────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ritmo_celery_worker
    command: >
      celery -A ritmo worker
      --loglevel=info
      --concurrency=2
      -Q default,export_high,export_normal,export_low
    volumes:
      - ./backend:/app
      - media_files:/app/media
    environment:
      - DEBUG=True
      - DB_NAME=ritmo_db
      - DB_USER=ritmo_user
      - DB_PASSWORD=ritmo_password
      - DB_HOST=postgres
      - DB_PORT=5432
      - SECRET_KEY=dev-insecure-key-change-in-production
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - USE_ASYNC_EXPORT=${USE_ASYNC_EXPORT:-false}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Frontend Vite (dev server com hot-reload) ─────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ritmo_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - VITE_FACEBOOK_APP_ID=${FACEBOOK_APP_ID:-}
      - VITE_GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - VITE_APPLE_CLIENT_ID=${APPLE_CLIENT_ID:-}
    depends_on:
      - backend
    stdin_open: true
    tty: true

volumes:
  postgres_data:
  media_files:
  redis_data:
