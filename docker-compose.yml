version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ritmo_postgres
    environment:
      POSTGRES_DB: ritmo_db
      POSTGRES_USER: ritmo_user
      POSTGRES_PASSWORD: ritmo_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ritmo_user -d ritmo_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ritmo_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - media_files:/app/media
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - DATABASE_URL=postgresql://ritmo_user:ritmo_password@postgres:5432/ritmo_db
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend
    depends_on:
      postgres:
        condition: service_healthy
    stdin_open: true
    tty: true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ritmo_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    stdin_open: true
    tty: true

volumes:
  postgres_data:
  media_files:
